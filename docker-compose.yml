version: "3.8"

services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: openfyp
      POSTGRES_PASSWORD: example
      POSTGRES_DB: fypdb
    volumes:
      - db_data:/var/lib/postgresql/data
    # map container 5432 to a non-conflicting host port 5433
    ports:
      - "5433:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql+psycopg2://openfyp:example@db:5432/fypdb
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    # Wait for Postgres TCP port to be available, then start uvicorn
    command: /bin/sh -c "until nc -z db 5432 ; do echo 'Waiting for db...'; sleep 1; done; uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  db_data:
